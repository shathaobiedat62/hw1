<!DOCTYPE html>
<html>
<head>

<style>


a{
  text-decoration: none;
  border: 2px solid green;
  padding: 10px 25px;
  color: black;
}


a:hover{
  background-color: green;
  color: white;
}


ul{
  background-color: yellow;
  width: 650px;
  padding: 20px;
}


li{
  color: orange;
}


.container{
  position: relative;
}


img{
  position: absolute;
  z-index: -1;
  width: 120px;
}

</style>

</head>

<body>


<br><br>

<a href="#">This is a link</a>

<br><br><br>

<ul>
<li>Coffee</li>
<li>Tea</li>
<li>Coca Cola</li>
</ul>

<br><br>

<div class="container">

<img src="download.jpg">

<h1>This is a heading</h1>

<p>
Because the image has a z-index of -1, it will be placed behind the text.
</p>

</div>

</body>
</html>
